<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWEN-STS REPORT GENERATOR</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f7f6; 
        }
        .header { 
            background-color: #232f3e; 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            padding: 20px; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        h2 { 
            color: #232f3e; 
            border-bottom: 2px solid #ff9900; 
            padding-bottom: 10px; 
        }
        button { 
            background-color: #ff9900; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            margin: 10px 5px; 
        }
        button:hover { 
            background-color: #e68a00; 
        }
        input { 
            padding: 10px; 
            width: 100%; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 5px; 
            display: none; 
        }
        .success { 
            background: #e2f0d9; 
            border-left: 5px solid #4CAF50; 
            color: #2e7d32; 
        }
        .error { 
            background: #fdecea; 
            border-left: 5px solid #f44336; 
            color: #c62828; 
        }
        .loading {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AWEN-STS REPORT GENERATOR</h1>
        <p>Student Teacher Dashboard</p>
    </div>

    <div class="container">
        <!-- My Profile / QR Check Section -->
        <div class="card">
            <h2>My Profile (QR Status & Placement)</h2>
            <p>Enter your Student ID to check your access status:</p>
            <input type="text" id="studentIdInput" placeholder="Enter your Student ID (e.g., Kwame Mensah)">
            <button onclick="checkStudentStatus()">Check My Status</button>
            
            <div id="resultBox" class="result"></div>
        </div>

        <!-- Other Dashboard Buttons -->
        <div class="card">
            <h2>Daily Tasks</h2>
            <button onclick="alert('Daily SRJ Log - Coming Soon!')">Daily SRJ Log</button>
            <button onclick="alert('School Profile - Coming Soon!')">School Profile</button>
            <button onclick="alert('Generate Report - Coming Soon!')">Generate Report</button>
        </div>
    </div>

    <script>
        // YOUR LAMBDA URL - Already configured!
        const LAMBDA_URL = 'https://3erbngd2ne5pcg2vcjrzb2hrjq0bnjhn.lambda-url.us-east-1.on.aws/';

        async function checkStudentStatus() {
            const studentId = document.getElementById('studentIdInput').value;
            const resultBox = document.getElementById('resultBox');
            
            if (!studentId) {
                alert('Please enter your Student ID');
                return;
            }

            // Show loading message
            resultBox.style.display = 'block';
            resultBox.className = 'result loading';
            resultBox.innerHTML = '<p> Checking your status...</p>';

            try {
                const response = await fetch(LAMBDA_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ student_id: studentId })
                });

                const data = await response.json();
                console.log('Response from Lambda:', data);
                
                if (data.statusCode === 200) {
                    const info = JSON.parse(data.body);
                    resultBox.className = 'result success';
                    resultBox.innerHTML = `
                        <h3>✅ ${info.message}</h3>
                        <p><strong>Name:</strong> ${info.student_name}</p>
                        <p><strong>School:</strong> ${info.school_id}</p>
                        <p><strong>Semester:</strong> ${info.semester}</p>
                        <p><strong>Year:</strong> ${info.year}</p>
                        <p><strong>Access Expires:</strong> ${info.expiry_date}</p>
                        <p><strong>Status:</strong> ${info.status}</p>
                    `;
                } else {
                    const info = JSON.parse(data.body);
                    resultBox.className = 'result error';
                    resultBox.innerHTML = `
                        <h3> ${info.message}</h3>
                        <p>${info.details || ''}</p>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                resultBox.className = 'result error';
                resultBox.innerHTML = `
                    <h3>🔌 Connection Error</h3>
                    <p>Could not connect to the server.</p>
                    <p><small>Error: ${error.message}</small></p>
                    <p><small>Please check your internet connection and try again.</small></p>
                `;
            }
        }
    </script>
</body>
</html>
