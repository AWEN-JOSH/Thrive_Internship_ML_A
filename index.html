<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWEN-STS REPORT GENERATOR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        .header { background-color: #232f3e; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #232f3e; border-bottom: 2px solid #ff9900; padding-bottom: 10px; }
        button { background-color: #ff9900; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px 5px; }
        button:hover { background-color: #e68a00; }
        input, select, textarea { padding: 10px; width: 100%; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: Arial, sans-serif; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #e2f0d9; border-left: 5px solid #4CAF50; color: #2e7d32; }
        .error { background: #fdecea; border-left: 5px solid #f44336; color: #c62828; }
        .loading { background: #fff3cd; border-left: 5px solid #ffc107; color: #856404; }
        .srj-item { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; }
        .srj-question { font-weight: bold; margin-bottom: 10px; color: #232f3e; }
        .checklist-item { margin: 5px 0; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AWEN-STS REPORT GENERATOR</h1>
        <p>Student Teacher Dashboard</p>
    </div>

    <div class="container">
        <!-- My Profile / QR Check Section -->
        <div class="card">
            <h2>My Profile (QR Status & Placement)</h2>
            <p>Enter your Student ID to check your access status:</p>
            <input type="text" id="studentIdInput" placeholder="Enter your Student ID (e.g., Kwame Mensah)">
            <button onclick="checkStudentStatus()">Check My Status</button>
            <div id="profileResult" class="result"></div>
        </div>

        <!-- Daily SRJ Log Section -->
        <div class="card">
            <h2>Daily SRJ Log</h2>
            <p>Generate your daily Student Reflective Journal and Observation Checklist:</p>
            
            <div id="srjInputSection" style="display:none;">
                <label><strong>Week Number (1-6):</strong></label>
                <input type="number" id="weekNumber" min="1" max="6" value="1">
                
                <label><strong>Day Number (1-5):</strong></label>
                <input type="number" id="dayNumber" min="1" max="5" value="1">
                
                <button onclick="generateDailySRJ()">Generate Daily SRJ</button>
            </div>
            
            <div id="srjResult" class="result"></div>
        </div>

        <!-- Other Dashboard Buttons -->
        <div class="card">
            <h2>Other Features</h2>
            <button onclick="alert('School Profile - Coming Soon!')">School Profile</button>
            <button onclick="alert('Generate Final Report - Coming Soon!')">Generate Report</button>
        </div>
    </div>

    <script>
        // YOUR LAMBDA URLs
        const CHECK_STATUS_URL = 'https://3erbngd2ne5pcg2vcjrzb2hrjq0bnjhn.lambda-url.us-east-1.on.aws/';
        const GENERATE_SRJ_URL = 'https://fwe3c5khbsp6tdsurvvfsefme40aevnx.lambda-url.us-east-1.on.aws/';
        const SAVE_LOG_URL = 'https://3n6sennmgib2fc24fz3ynbm5u40zekrs.lambda-url.us-east-1.on.aws/';
        
        let currentStudentId = null;

        // Function to check student status
        async function checkStudentStatus() {
            const studentId = document.getElementById('studentIdInput').value;
            const resultBox = document.getElementById('profileResult');
            
            if (!studentId) {
                alert('Please enter your Student ID');
                return;
            }

            resultBox.style.display = 'block';
            resultBox.className = 'result loading';
            resultBox.innerHTML = '<p>⏳ Checking your status...</p>';

            try {
                const response = await fetch(CHECK_STATUS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId })
                });

                const data = await response.json();
                
                if (response.ok) {
                    currentStudentId = studentId;
                    resultBox.className = 'result success';
                    resultBox.innerHTML = `
                        <h3>✅ ${data.message}</h3>
                        <p><strong>Name:</strong> ${data.student_name}</p>
                        <p><strong>School:</strong> ${data.school_id}</p>
                        <p><strong>Semester:</strong> ${data.semester}</p>
                        <p><strong>Access Expires:</strong> ${data.expiry_date}</p>
                    `;
                    // Show the SRJ input section
                    document.getElementById('srjInputSection').style.display = 'block';
                } else {
                    resultBox.className = 'result error';
                    resultBox.innerHTML = `<h3>❌ ${data.message}</h3><p>${data.details || ''}</p>`;
                }
            } catch (error) {
                resultBox.className = 'result error';
                resultBox.innerHTML = `<h3>🔌 Error</h3><p>${error.message}</p>`;
            }
        }

        // Function to generate daily SRJ
        async function generateDailySRJ() {
            if (!currentStudentId) {
                alert('Please check your status first using "Check My Status"');
                return;
            }

            const week = document.getElementById('weekNumber').value;
            const day = document.getElementById('dayNumber').value;
            const resultBox = document.getElementById('srjResult');
            
            resultBox.style.display = 'block';
            resultBox.className = 'result loading';
            resultBox.innerHTML = '<p>🤖 Generating your daily SRJ questions...</p>';

            try {
                const response = await fetch(GENERATE_SRJ_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: currentStudentId,
                        week: parseInt(week),
                        day: parseInt(day)
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultBox.className = 'result success';
                    
                    // Build the SRJ display with INPUT FIELDS
                    let html = `<h3>📚 Week ${week}, Day ${day} - SRJ & Observation Checklist</h3>`;
                    html += `<p><strong>Student:</strong> Year ${data.student_year}, Semester ${data.student_semester}</p>`;

                    // Display SRJ Questions with TEXT AREAS for answers
                    html += `<div class="srj-item"><h4>📝 Student Reflective Journal - Your Answers:</h4>`;
                    if (Array.isArray(data.srj_questions)) {
                        data.srj_questions.forEach((q, index) => {
                            html += `<div class="srj-question">${index + 1}. ${q}</div>`;
                            html += `<textarea id="srj-answer-${index}" rows="4" placeholder="Type your reflection here..." style="width:100%; margin-bottom:15px; padding:10px; border:1px solid #ccc; border-radius:5px;"></textarea>`;
                        });
                    } else {
                        html += `<div>${data.srj_questions}</div>`;
                    }
                    html += `</div>`;

                    // Display Checklist with CHECKBOXES
                    html += `<div class="srj-item"><h4>✅ Observation Checklist:</h4>`;
                    if (Array.isArray(data.checklist)) {
                        data.checklist.forEach((item, index) => {
                            html += `<div style="margin:10px 0;"><label><input type="checkbox" id="checklist-${index}" style="margin-right:10px;"> ${item}</label></div>`;
                        });
                    } else {
                        html += `<div>${data.checklist}</div>`;
                    }
                    html += `</div>`;

                    // Add SAVE button
                    html += `<button onclick="saveDailyLog()" style="margin-top:20px; background-color:#28a745;">💾 Save My Daily Log</button>`;
                    html += `<div id="saveStatus" style="margin-top:10px;"></div>`;

                    resultBox.innerHTML = html;
                } else {
                    resultBox.className = 'result error';
                    resultBox.innerHTML = `<h3>❌ Error</h3><p>${data.error || 'Failed to generate SRJ'}</p>`;
                }
            } catch (error) {
                resultBox.className = 'result error';
                resultBox.innerHTML = `<h3>🔌 Connection Error</h3><p>${error.message}</p>`;
            }
        }

        // Function to save daily log to DynamoDB
        async function saveDailyLog() {
            const week = document.getElementById('weekNumber').value;
            const day = document.getElementById('dayNumber').value;
            
            // Collect SRJ answers
            const srjAnswers = [];
            for (let i = 0; i < 3; i++) {
                const answerElement = document.getElementById(`srj-answer-${i}`);
                if (answerElement && answerElement.value.trim() !== '') {
                    srjAnswers.push({
                        question_number: i + 1,
                        answer: answerElement.value.trim()
                    });
                }
            }
            
            // Collect checklist responses
            const checklistResponses = [];
            for (let i = 0; i < 4; i++) {
                const checkbox = document.getElementById(`checklist-${i}`);
                if (checkbox) {
                    const itemText = checkbox.parentElement.textContent.trim();
                    checklistResponses.push({
                        item: itemText,
                        completed: checkbox.checked
                    });
                }
            }
            
            // Prepare data to save
            const logData = {
                student_id: currentStudentId,
                week: parseInt(week),
                day: parseInt(day),
                srj_answers: srjAnswers,
                checklist: checklistResponses,
                timestamp: new Date().toISOString()
            };
            
            const statusDiv = document.getElementById('saveStatus');
            statusDiv.innerHTML = '<p>⏳ Saving...</p>';
            
            try {
                // Call the save-daily-log Lambda function
                const response = await fetch(SAVE_LOG_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = '<p style="color:green; font-weight:bold;">✅ Daily log saved to database!</p>';
                    alert('Excellent work! Your daily SRJ has been saved to the database. Keep it up!');
                } else {
                    statusDiv.innerHTML = '<p style="color:red;">❌ Error: ' + (result.error || 'Failed to save') + '</p>';
                }
                
            } catch (error) {
                statusDiv.innerHTML = '<p style="color:red;">❌ Error saving. Please try again.</p>';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
